<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Hotel Afisha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Libre+Caslon+Display&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --dark: #0e0e1a; --dark-surface: #151525; --taupe: #a19581;
  --cream: #f5f0eb; --accent: #c9a96e;
  --font-heading: 'Cormorant Garamond', serif;
  --font-body: 'DM Sans', sans-serif;
}
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body { font-family: var(--font-body); background: var(--dark); color: var(--cream); min-height: 100vh; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 0 clamp(24px,4vw,60px); height: 72px; border-bottom: 1px solid rgba(245,240,235,0.06); }
.header__logo { text-decoration: none; display: inline-block; overflow: hidden; height: 22px; }
.header__logo img { filter: brightness(0) saturate(100%) invert(15%) sepia(95%) saturate(6000%) hue-rotate(355deg) brightness(95%) contrast(95%); margin-top: -2px; }
.header__back { font-family: var(--font-body); font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--taupe); text-decoration: none; display: flex; align-items: center; gap: 8px; transition: color 0.3s; }
.header__back:hover { color: var(--cream); }
.header__back svg { width: 16px; height: 16px; }
.page-title { text-align: center; padding: clamp(50px,6vw,90px) 24px clamp(30px,4vw,50px); }
.page-title h1 { font-family: var(--font-heading); font-weight: 400; font-size: clamp(32px,5vw,56px); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 16px; }
.page-title p { font-size: 15px; color: rgba(245,240,235,0.4); max-width: 500px; margin: 0 auto; line-height: 1.8; }
.gallery { max-width: 1100px; margin: 0 auto; padding: 0 clamp(24px,4vw,60px) clamp(60px,8vw,100px); columns: 3; column-gap: 16px; }
.gallery img { width: 100%; margin-bottom: 16px; display: block; border: 1px solid rgba(245,240,235,0.06); transition: transform 0.4s, border-color 0.3s; cursor: pointer; }
.gallery img:hover { border-color: rgba(245,240,235,0.15); transform: scale(1.02); }
@media (max-width: 768px) { .gallery { columns: 2; } }
@media (max-width: 480px) { .gallery { columns: 1; } }
</style>
</head>
<body>
<header class="header">
  <a href="index.html" class="header__logo">
    <img src="https://cdn.prod.website-files.com/669a26f7d42524ab776f6ebf/66ac0f8b54e4c62eee2e4777_afisha-logo.svg" alt="Hotel Afisha" height="22">
  </a>
  <a href="index.html" class="header__back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back to Hotel
  </a>
</header>

<div class="page-title">
  <h1>Gallery</h1>
  <p>A visual journey through Hotel Afisha — where Georgian cinema heritage meets contemporary luxury.</p>
</div>

<div class="gallery">
  <img src="https://cdn.prod.website-files.com/669a26f7d42524ab776f6ebf/67402dc9f0f0a08187dfc222_standard.jpg" alt="Standard Room">
  <img src="https://cdn.prod.website-files.com/669a26f7d42524ab776f6ebf/67402ee9e943da7c3d131e1c_deluxe2.jpg" alt="Deluxe Room">
  <img src="https://cdn.prod.website-files.com/669a26f7d42524ab776f6ebf/67403096dd808218743f514d_superior.jpg" alt="Superior Room">
  <img src="https://cdn.prod.website-files.com/669a26f7d42524ab776f6ebf/67402fb0654d0668668046de_junior%20suite2.jpg" alt="Junior Suite">
  <img src="https://cdn.prod.website-files.com/669a26f7d42524ab776f6ebf/6740313460da430d0d25e34b_executive%20copy.jpg" alt="Executive Suite">
  <img src="hotel-afisha-tbilisi-pic-12.jpg" alt="Hotel Afisha Tbilisi">
  <img src="cinema-room.jpg" alt="Cinema Room">
  <img src="philharmonic.jpg" alt="Philharmonic View">
</div>
</body>
</html>
