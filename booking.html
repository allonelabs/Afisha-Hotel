<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Your Stay — Hotel Afisha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Libre+Caslon+Display&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --dark: #0e0e1a;
  --dark-surface: #151525;
  --taupe: #a19581;
  --cream: #f5f0eb;
  --accent: #c9a96e;
  --font-heading: 'Cormorant Garamond', serif;
  --font-body: 'DM Sans', sans-serif;
}

html, body {
  height: 100%;
  font-family: var(--font-body);
  background: var(--dark);
  color: var(--cream);
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 clamp(24px, 4vw, 60px);
  height: 72px;
  border-bottom: 1px solid rgba(245, 240, 235, 0.06);
}

.header__logo {
  text-decoration: none;
  white-space: nowrap;
  display: inline-block;
  overflow: hidden;
  height: 22px;
}

.header__logo img {
  filter: brightness(0) saturate(100%) invert(15%) sepia(95%) saturate(6000%) hue-rotate(355deg) brightness(95%) contrast(95%);
  margin-top: -2px;
}

.header__back {
  font-family: var(--font-body);
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--taupe);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: color 0.3s;
}

.header__back:hover {
  color: var(--cream);
}

.header__back svg {
  width: 16px;
  height: 16px;
}

.page-title {
  text-align: center;
  padding: clamp(30px, 4vw, 50px) 24px clamp(20px, 3vw, 30px);
}

.page-title h1 {
  font-family: var(--font-heading);
  font-weight: 400;
  font-size: clamp(28px, 4vw, 48px);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.page-title p {
  font-size: 14px;
  color: rgba(245, 240, 235, 0.4);
  max-width: 440px;
  margin: 0 auto;
  line-height: 1.7;
}

.booking-embed {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 clamp(24px, 4vw, 60px) clamp(40px, 6vw, 80px);
}

.booking-embed iframe {
  width: 100%;
  height: calc(100vh - 220px);
  min-height: 600px;
  border: none;
  border-radius: 8px;
  background: #fff;
}
</style>
</head>
<body>

<header class="header">
  <a href="index.html" class="header__logo">
    <img src="https://cdn.prod.website-files.com/669a26f7d42524ab776f6ebf/66ac0f8b54e4c62eee2e4777_afisha-logo.svg" alt="Hotel Afisha" height="22">
  </a>
  <a href="index.html" class="header__back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back to Hotel
  </a>
</header>

<div class="page-title">
  <h1>Book Your Stay</h1>
  <p>Select your dates, room, and complete your reservation.</p>
</div>

<div class="booking-embed">
  <iframe
    src="https://www.swiftbook.io/inst/#home?propertyId=681Nz1gx7jSQeoMxbrbaGYlF5EZL98zP7QIhPfTI3Mjc=&JDRN=Y"
    title="Book Your Stay at Hotel Afisha"
    loading="lazy">
  </iframe>
</div>

</body>
</html>
