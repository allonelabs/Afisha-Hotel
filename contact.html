<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --dark: #0e0e1a; --dark-surface: #151525; --taupe: #a19581;
  --cream: #f5f0eb; --accent: #c9a96e;
  --font-heading: 'Cormorant Garamond', serif;
  --font-body: 'DM Sans', sans-serif;
}
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body { font-family: var(--font-body); background: var(--dark); color: var(--cream); min-height: 100vh; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 0 clamp(24px,4vw,60px); height: 72px; border-bottom: 1px solid rgba(245,240,235,0.06); }
.header__logo { text-decoration: none; display: inline-block; overflow: hidden; height: 22px; }
.header__logo img { filter: brightness(0) saturate(100%) invert(15%) sepia(95%) saturate(6000%) hue-rotate(355deg) brightness(95%) contrast(95%); margin-top: -2px; }
.header__back { font-family: var(--font-body); font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--taupe); text-decoration: none; display: flex; align-items: center; gap: 8px; transition: color 0.3s; }
.header__back:hover { color: var(--cream); }
.header__back svg { width: 16px; height: 16px; }
.page-title { text-align: center; padding: clamp(50px,6vw,90px) 24px clamp(30px,4vw,50px); }
.page-title h1 { font-family: var(--font-heading); font-weight: 400; font-size: clamp(32px,5vw,56px); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 16px; }
.page-title p { font-size: 15px; color: rgba(245,240,235,0.4); max-width: 500px; margin: 0 auto; line-height: 1.8; }
.content { max-width: 900px; margin: 0 auto; padding: 0 clamp(24px,4vw,60px) clamp(60px,8vw,100px); }
.contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 40px; }
.contact-card { background: var(--dark-surface); border: 1px solid rgba(245,240,235,0.06); padding: 36px 32px; transition: border-color 0.3s; }
.contact-card:hover { border-color: rgba(245,240,235,0.15); }
.contact-card__label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--taupe); margin-bottom: 16px; }
.contact-card__value { font-family: var(--font-heading); font-size: 22px; font-weight: 400; }
.contact-card__value a { color: var(--cream); text-decoration: none; transition: color 0.3s; }
.contact-card__value a:hover { color: var(--accent); }
.map { margin-top: 50px; border: 1px solid rgba(245,240,235,0.06); }
.map iframe { width: 100%; height: 400px; border: none; filter: grayscale(1) invert(1) contrast(0.9) brightness(0.6); }
.socials { display: flex; gap: 16px; margin-top: 40px; justify-content: center; }
.socials a { width: 44px; height: 44px; border: 1px solid rgba(245,240,235,0.1); display: flex; align-items: center; justify-content: center; color: var(--taupe); transition: all 0.3s; text-decoration: none; }
.socials a:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
